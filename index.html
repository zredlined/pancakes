<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pancakes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            background: radial-gradient(ellipse at top, #1a1a1a 0%, #000 100%);
        }

        .container { max-width: 900px; margin: 0 auto; }

        .card {
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* ── Unlock screen ───────────────────────────────────────── */
        .unlock-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 40px);
        }

        .unlock-card {
            width: 100%;
            max-width: 360px;
            text-align: center;
            padding: 48px 32px 40px;
        }

        .lock-icon { font-size: 48px; margin-bottom: 20px; }

        .unlock-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
        }

        .pass-wrap { position: relative; margin-bottom: 16px; }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 16px 48px 16px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 18px;
            letter-spacing: 0.06em;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="password"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.2);
        }

        input::placeholder { color: #6d6d70; letter-spacing: 0; }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6d6d70;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }

        .error-msg {
            color: #ff453a;
            font-size: 15px;
            margin-top: 10px;
            min-height: 20px;
        }

        /* ── Shared button ───────────────────────────────────────── */
        .button {
            background: linear-gradient(135deg, #007aff 0%, #0051d0 100%);
            color: #fff;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.35);
        }

        .button:hover { opacity: 0.88; }
        .button:active { opacity: 0.75; }

        /* ── Stock header ────────────────────────────────────────── */
        .stock-header {
            text-align: center;
            position: relative;
        }

        .ticker {
            font-size: 12px;
            font-weight: 700;
            color: #6d6d70;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .price {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .change { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .updated { font-size: 13px; color: #6d6d70; }

        .lock-icon-btn {
            position: absolute;
            top: 14px;
            right: 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .lock-icon-btn:hover { background: rgba(255, 255, 255, 0.14); }

        /* ── Hero card ───────────────────────────────────────────── */
        .hero-card { text-align: center; padding: 32px 24px; }

        .hero-label {
            font-size: 16px;
            color: #a1a1a6;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 10px;
        }

        .hero-value {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, #30d158 0%, #34c759 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .hero-breakdown {
            font-size: 15px;
            color: #6d6d70;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .hero-rate {
            display: inline-block;
            background: rgba(255, 159, 10, 0.12);
            border: 1px solid rgba(255, 159, 10, 0.25);
            color: #ff9f0a;
            font-size: 15px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 20px;
        }

        /* ── Payday card ─────────────────────────────────────────── */
        .payday-card {
            border-color: rgba(255, 159, 10, 0.3);
            background: rgba(255, 159, 10, 0.04);
        }

        .payday-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .payday-label {
            font-size: 12px;
            font-weight: 700;
            color: #ff9f0a;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .payday-date {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .payday-countdown {
            font-size: 32px;
            font-weight: 800;
            color: #ff9f0a;
            letter-spacing: -0.02em;
            text-align: right;
        }

        .payday-countdown .cd-sub {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #a1a1a6;
            text-align: right;
            letter-spacing: 0;
        }

        .payday-details {
            font-size: 15px;
            color: #a1a1a6;
            margin-top: 10px;
        }

        /* ── Progress bars ───────────────────────────────────────── */
        .progress-section { margin-bottom: 28px; }
        .progress-section:last-child { margin-bottom: 0; }

        .progress-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.015em;
        }

        .progress-subtitle {
            font-size: 14px;
            color: #a1a1a6;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orange-gradient {
            background: linear-gradient(90deg, #ff9500 0%, #ffb340 100%);
            box-shadow: 0 1px 6px rgba(255, 149, 0, 0.4);
        }

        .blue-gradient {
            background: linear-gradient(90deg, #007aff 0%, #5856d6 100%);
            box-shadow: 0 1px 6px rgba(0, 122, 255, 0.35);
        }

        .red-green-gradient {
            background: linear-gradient(90deg, #ff6b6b 0%, #ffa726 40%, #30d158 100%);
        }

        .progress-text { font-size: 14px; color: #a1a1a6; }

        /* ── Stats grid ──────────────────────────────────────────── */
        .three-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .metric {
            text-align: center;
            padding: 20px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .metric-value {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        /* Deal value: slightly larger, purple — feels premium */
        .metric-value.deal {
            font-size: 30px;
            background: linear-gradient(135deg, #bf5af2 0%, #5856d6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* NVDA appreciation: green when up, red when down */
        .metric-value.pos {
            background: linear-gradient(135deg, #30d158 0%, #34c759 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metric-value.neg {
            background: linear-gradient(135deg, #ff453a 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .metric-label {
            font-size: 13px;
            color: #a1a1a6;
            font-weight: 500;
        }

        /* ── Payment schedule list ───────────────────────────────── */
        details > summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        details > summary::-webkit-details-marker { display: none; }

        details > summary::after {
            content: '⌄';
            font-size: 22px;
            color: #6d6d70;
            transition: transform 0.2s;
        }

        details[open] > summary::after { transform: rotate(180deg); }

        .schedule-summary-text {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .schedule-summary-text h3 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .schedule-count {
            font-size: 14px;
            color: #6d6d70;
            font-weight: 500;
        }

        .payment-list { margin-top: 20px; }

        .payment-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 8px;
            border-radius: 10px;
            gap: 10px;
            transition: background 0.15s;
        }

        .payment-item:hover { background: rgba(255,255,255,0.04); }

        .item-past { opacity: 0.45; }

        .item-next {
            background: rgba(255, 159, 10, 0.07) !important;
            border: 1px solid rgba(255, 159, 10, 0.2);
        }

        /* Escrow event: gold treatment */
        .item-escrow {
            background: rgba(255, 214, 10, 0.05) !important;
            border: 1px solid rgba(255, 214, 10, 0.2);
            padding: 14px 12px !important;
            margin: 2px 0;
        }

        .item-escrow .pi-value { color: #ffd60a; font-size: 16px; }
        .item-escrow .pi-star  { font-size: 16px; }

        .pi-icon {
            width: 22px;
            flex-shrink: 0;
            text-align: center;
            margin-top: 1px;
            font-size: 14px;
        }

        .pi-check { color: #30d158; }
        .pi-star  { color: #ffd60a; }
        .pi-next  { color: #ff9f0a; font-size: 11px; }
        .pi-dot   { color: #48484a; font-size: 20px; line-height: 0.85; }

        .pi-info { flex: 1; min-width: 0; }

        .pi-row1 {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            margin-bottom: 2px;
        }

        .pi-date {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .pi-qlabel { font-size: 11px; color: #6d6d70; font-weight: 500; }

        .pi-row2 { font-size: 13px; color: #8e8e93; }

        .pi-value {
            font-size: 14px;
            font-weight: 600;
            color: #8e8e93;
            white-space: nowrap;
            text-align: right;
            padding-top: 2px;
        }

        .item-next .pi-value { color: #fff; font-size: 16px; }

        .badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .badge-days   { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }
        .badge-escrow { background: rgba(255, 214, 10, 0.12); color: #ffd60a; }

        /* ── Hidden utility ──────────────────────────────────────── */
        .hidden { display: none !important; }

        /* ── Responsive ──────────────────────────────────────────── */
        @media (max-width: 680px) {
            .three-grid { grid-template-columns: 1fr; }
            .hero-value { font-size: 52px; }
            .price      { font-size: 40px; }
        }

        @media (max-width: 480px) {
            body        { padding: 12px; }
            .card       { padding: 18px; margin-bottom: 14px; }
            .hero-value { font-size: 44px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ── Unlock screen ────────────────────────────────────────── -->
    <div id="unlockScreen">
        <div class="unlock-wrap">
            <div class="card unlock-card">
                <div class="lock-icon">🥞</div>
                <div class="unlock-title">Pancakes</div>
                <div class="pass-wrap">
                    <input type="password" id="passInput" placeholder="Password"
                           autocomplete="current-password"
                           onkeydown="if(event.key==='Enter') unlock()">
                    <button class="eye-btn" onclick="toggleEye(this)" type="button" aria-label="Show password">👁</button>
                </div>
                <button class="button" onclick="unlock()" id="unlockBtn">Unlock</button>
                <div class="error-msg hidden" id="unlockError">Incorrect password — try again</div>
            </div>
        </div>
    </div>

    <!-- ── Dashboard ────────────────────────────────────────────── -->
    <div id="dashboard" class="hidden">

        <!-- Stock header (lock button lives here now) -->
        <div class="card stock-header">
            <button class="lock-icon-btn" onclick="lock()" title="Lock">🔒</button>
            <div class="ticker">NVDA</div>
            <div class="price" id="stockPrice">—</div>
            <div class="change" id="priceChange"></div>
            <div class="updated" id="lastUpdated"></div>
        </div>

        <!-- Hero: total earned -->
        <div class="card hero-card">
            <div class="hero-label">Earned to date</div>
            <div class="hero-value" id="totalEarned">—</div>
            <div class="hero-breakdown" id="heroBreakdown"></div>
            <span class="hero-rate" id="dailyRate"></span>
        </div>

        <!-- Next payday -->
        <div class="card payday-card" id="paydayCard">
            <div class="payday-header">
                <div>
                    <div class="payday-label">Next Payday</div>
                    <div class="payday-date" id="nextPayDate">—</div>
                </div>
                <div class="payday-countdown">
                    <span id="nextPayDays">—</span>
                    <span class="cd-sub">days away</span>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill orange-gradient" id="quarterProgress" style="width:0%"></div>
            </div>
            <div class="payday-details" id="nextPayDetails"></div>
        </div>

        <!-- Progress: escrow + overall vesting in one card -->
        <div class="card">
            <div class="progress-section" id="escrowSection">
                <div class="progress-title">Escrow Release</div>
                <div class="progress-subtitle" id="escrowSub"></div>
                <div class="progress-bar">
                    <div class="progress-fill red-green-gradient" id="escrowProgress" style="width:0%"></div>
                </div>
                <div class="progress-text" id="escrowText"></div>
            </div>
            <div class="progress-section">
                <div class="progress-title">Vesting Progress</div>
                <div class="progress-subtitle">4-year schedule</div>
                <div class="progress-bar">
                    <div class="progress-fill blue-gradient" id="overallProgress" style="width:0%"></div>
                </div>
                <div class="progress-text" id="overallText"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="card">
            <div class="three-grid">
                <div class="metric">
                    <div class="metric-value deal" id="totalDealValue">—</div>
                    <div class="metric-label">Total deal value today</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="remainingValue">—</div>
                    <div class="metric-label">Still to vest</div>
                </div>
                <div class="metric">
                    <div class="metric-value" id="stockAppreciation">—</div>
                    <div class="metric-label">NVDA appreciation</div>
                </div>
            </div>
        </div>

        <!-- Payment schedule -->
        <div class="card">
            <details>
                <summary>
                    <div class="schedule-summary-text">
                        <h3>Payment Schedule</h3>
                        <span class="schedule-count" id="scheduleCount"></span>
                    </div>
                </summary>
                <div class="payment-list" id="paymentList"></div>
            </details>
        </div>

    </div>

</div>
<script>
'use strict';

// ── Constants ────────────────────────────────────────────────────────────────
const PASS_KEY    = '_pv1';
const CLOSE_DATE  = new Date(2025, 2, 14, 12, 0, 0);
const ESCROW_DATE = new Date(2026, 10, 12, 12, 0, 0);

// ── State ────────────────────────────────────────────────────────────────────
let scheduleBlob  = null;
let schedule      = null;
let stockData     = { price: 0, timestamp: Date.now() / 1000 };
let heroAnimated  = false;

// ── Crypto helpers ───────────────────────────────────────────────────────────
function fromHex(hex) {
    return new Uint8Array(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
}

async function decrypt(blob, password) {
    const enc  = new TextEncoder();
    const iv   = fromHex(blob.i);
    const salt = fromHex(blob.l);
    const ct   = Uint8Array.from(atob(blob.d), c => c.charCodeAt(0));
    const km   = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const key  = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return JSON.parse(new TextDecoder().decode(pt));
}

// ── Date helpers ─────────────────────────────────────────────────────────────
function parseDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d, 12, 0, 0);
}

function today() {
    const n = new Date();
    return new Date(n.getFullYear(), n.getMonth(), n.getDate(), 12, 0, 0);
}

// ── Format helpers ───────────────────────────────────────────────────────────
function fmtM(n) {
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return '$' + Math.round(n).toLocaleString();
    return '$' + n.toFixed(0);
}

function fmtFull(n) { return '$' + Math.round(n).toLocaleString(); }

function fmtDate(d) {
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function getQL(idx) { return `Y${Math.floor(idx / 4) + 1} Q${(idx % 4) + 1}`; }

// ── Hero count-up animation ───────────────────────────────────────────────────
function animateHero(target) {
    const el       = document.getElementById('totalEarned');
    const duration = 1200;
    const t0       = performance.now();

    (function tick(now) {
        const t      = Math.min((now - t0) / duration, 1);
        const eased  = 1 - Math.pow(1 - t, 3); // ease-out cubic
        el.textContent = fmtM(target * eased);
        if (t < 1) requestAnimationFrame(tick);
    })(t0);
}

// ── Compute status ────────────────────────────────────────────────────────────
function getStatus(sch, price) {
    const now      = today();
    const events   = sch.ev;
    const lastDate = parseDate(events[events.length - 1].d);

    const pastEvents   = events.filter(e => parseDate(e.d) <= now);
    const futureEvents = events.filter(e => parseDate(e.d) > now);
    const nextEvent    = futureEvents[0] || null;
    const prevEvent    = pastEvents[pastEvents.length - 1] || null;

    const issuedShares = pastEvents.reduce((s, e) => s + e.s, 0);
    const pastCash     = pastEvents.reduce((s, e) => s + e.c, 0);
    const totalEarned  = sch.k + issuedShares * price + pastCash;

    const remShares = futureEvents.reduce((s, e) => s + e.s, 0);
    const remCash   = futureEvents.reduce((s, e) => s + e.c, 0);
    const remValue  = remShares * price + remCash;

    const daysToNext = nextEvent ? Math.ceil((parseDate(nextEvent.d) - now) / 86400000) : 0;
    const nextValue  = nextEvent ? nextEvent.s * price + nextEvent.c : 0;

    let qPct = 0, daysSincePrev = 0, qLen = 0;
    if (prevEvent && nextEvent) {
        const pDate   = parseDate(prevEvent.d);
        const nDate   = parseDate(nextEvent.d);
        daysSincePrev = Math.max(0, Math.floor((now - pDate) / 86400000));
        qLen          = Math.floor((nDate - pDate) / 86400000);
        qPct          = Math.min(daysSincePrev / qLen, 1);
    } else if (!nextEvent) {
        qPct = 1;
    }

    const totalDays   = Math.floor((lastDate - CLOSE_DATE) / 86400000);
    const elapsedDays = Math.max(0, Math.floor((now - CLOSE_DATE) / 86400000));
    const overallPct  = Math.min(elapsedDays / totalDays, 1);

    const escrowDone   = now >= ESCROW_DATE;
    const escrowTotal  = Math.floor((ESCROW_DATE - CLOSE_DATE) / 86400000);
    const escrowElap   = Math.max(0, Math.floor((now - CLOSE_DATE) / 86400000));
    const escrowPct    = Math.min(escrowElap / escrowTotal, 1);
    const daysToEscrow = Math.max(0, Math.ceil((ESCROW_DATE - now) / 86400000));

    const remDays   = Math.max(1, Math.ceil((lastDate - now) / 86400000));
    const dailyRate = remValue / remDays;

    const allShares = events.reduce((s, e) => s + e.s, 0);
    const allCash   = events.reduce((s, e) => s + e.c, 0);
    const dealValue = allShares * price + sch.k + allCash;

    const appreciation = ((price - sch.p) / sch.p) * 100;

    return {
        totalEarned, issuedShares, pastCash,
        nextEvent, daysToNext, nextValue, prevEvent,
        qPct, daysSincePrev, qLen,
        overallPct, elapsedDays, totalDays,
        escrowDone, escrowPct, daysToEscrow,
        dailyRate, remValue,
        dealValue, appreciation,
        payCount: pastEvents.length,
        totalCount: events.length
    };
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
    if (!schedule) return;
    const price = stockData.price;
    const s     = getStatus(schedule, price);
    const ap    = s.appreciation;

    // Stock header
    document.getElementById('stockPrice').textContent = fmtFull(price);
    const changeEl = document.getElementById('priceChange');
    changeEl.textContent = `${ap >= 0 ? '↑' : '↓'} ${ap >= 0 ? '+' : ''}${ap.toFixed(2)}% from acquisition`;
    changeEl.style.color = ap >= 0 ? '#30d158' : '#ff453a';
    const hrsAgo = Math.floor((Date.now() / 1000 - stockData.timestamp) / 3600);
    document.getElementById('lastUpdated').textContent =
        hrsAgo < 1 ? 'Updated recently' : `Updated ${hrsAgo}h ago`;

    // Hero (animate on first load only)
    if (!heroAnimated) {
        heroAnimated = true;
        animateHero(s.totalEarned);
    } else {
        document.getElementById('totalEarned').textContent = fmtM(s.totalEarned);
    }
    document.getElementById('heroBreakdown').textContent =
        `$${(schedule.k / 1e6).toFixed(1)}M cash at close  ·  ${s.issuedShares.toLocaleString()} shares issued`;
    document.getElementById('dailyRate').textContent =
        `${fmtFull(Math.round(s.dailyRate))} vesting per day`;

    // Next payday
    if (s.nextEvent) {
        const nd = parseDate(s.nextEvent.d);
        document.getElementById('nextPayDate').textContent = fmtDate(nd);
        document.getElementById('nextPayDays').textContent = s.daysToNext;
        document.getElementById('quarterProgress').style.width = `${s.qPct * 100}%`;

        let details = `${s.nextEvent.s.toLocaleString()} shares`;
        if (s.nextEvent.c > 0) details += ` + ${fmtM(s.nextEvent.c)} cash`;
        details += `  ·  ~${fmtFull(Math.round(s.nextValue))} at current price`;
        document.getElementById('nextPayDetails').textContent = details;
        document.getElementById('paydayCard').classList.remove('hidden');
    } else {
        document.getElementById('paydayCard').classList.add('hidden');
    }

    // Escrow (hide the whole section once released)
    if (!s.escrowDone) {
        document.getElementById('escrowSub').textContent = fmtDate(ESCROW_DATE);
        document.getElementById('escrowProgress').style.width = `${s.escrowPct * 100}%`;
        document.getElementById('escrowText').textContent =
            `${Math.round(s.escrowPct * 100)}%  ·  ${s.daysToEscrow} days remaining`;
        document.getElementById('escrowSection').classList.remove('hidden');
    } else {
        document.getElementById('escrowSection').classList.add('hidden');
    }

    // Overall vesting
    document.getElementById('overallProgress').style.width = `${s.overallPct * 100}%`;
    document.getElementById('overallText').textContent =
        `${Math.round(s.overallPct * 100)}%  ·  ${s.payCount} of ${s.totalCount} vesting dates`;

    // Stats
    document.getElementById('totalDealValue').textContent = fmtM(s.dealValue);
    document.getElementById('remainingValue').textContent = fmtM(s.remValue);

    const apEl = document.getElementById('stockAppreciation');
    apEl.className = 'metric-value ' + (ap >= 0 ? 'pos' : 'neg');
    apEl.textContent = `${ap >= 0 ? '+' : ''}${ap.toFixed(1)}%`;

    // Schedule header
    document.getElementById('scheduleCount').textContent =
        `${s.payCount} of ${s.totalCount} complete`;

    renderPaymentList();
}

function renderPaymentList() {
    const now    = today();
    const price  = stockData.price;
    const events = schedule.ev;
    let nextFound = false;

    const html = events.map((ev, idx) => {
        const date     = parseDate(ev.d);
        const isPast   = date <= now;
        const isNext   = !isPast && !nextFound;
        if (isNext) nextFound = true;
        const isEscrow = ev.c > 0;
        const totalVal = ev.s * price + ev.c;
        const daysTo   = Math.ceil((date - now) / 86400000);

        let cls = 'payment-item';
        if (isPast)             cls += ' item-past';
        else if (isNext)        cls += ' item-next';
        else if (isEscrow)      cls += ' item-escrow';

        let icon;
        if (isPast)        icon = `<span class="pi-check">✓</span>`;
        else if (isEscrow) icon = `<span class="pi-star">★</span>`;
        else if (isNext)   icon = `<span class="pi-next">▶</span>`;
        else               icon = `<span class="pi-dot">·</span>`;

        let amtStr;
        if (ev.s === 0 && ev.c === 0) {
            amtStr = 'shares held for escrow release';
        } else if (ev.c > 0) {
            amtStr = `${ev.s.toLocaleString()} shares + ${fmtM(ev.c)} cash`;
        } else {
            amtStr = `${ev.s.toLocaleString()} shares`;
        }

        const valStr  = totalVal > 0 ? fmtM(totalVal) : '';
        const daysBdg = !isPast && daysTo > 0
            ? `<span class="badge badge-days">in ${daysTo}d</span>` : '';
        const escrBdg = isEscrow
            ? `<span class="badge badge-escrow">Escrow Release</span>` : '';

        return `<div class="${cls}">
            <div class="pi-icon">${icon}</div>
            <div class="pi-info">
                <div class="pi-row1">
                    <span class="pi-date">${fmtDate(date)}</span>
                    <span class="pi-qlabel">${getQL(idx)}</span>
                    ${escrBdg}${daysBdg}
                </div>
                <div class="pi-row2">${amtStr}</div>
            </div>
            <div class="pi-value">${valStr}</div>
        </div>`;
    }).join('');

    document.getElementById('paymentList').innerHTML = html;
}

// ── UI flow ──────────────────────────────────────────────────────────────────
function showUnlock(errorMsg) {
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('unlockScreen').classList.remove('hidden');
    if (errorMsg) {
        document.getElementById('unlockError').textContent = errorMsg;
        document.getElementById('unlockError').classList.remove('hidden');
    } else {
        document.getElementById('unlockError').classList.add('hidden');
    }
    setTimeout(() => document.getElementById('passInput').focus(), 50);
}

function showDashboard() {
    document.getElementById('unlockScreen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
}

async function unlock() {
    const btn  = document.getElementById('unlockBtn');
    const pass = document.getElementById('passInput').value;
    if (!pass) return;

    btn.disabled = true;
    btn.textContent = 'Unlocking…';

    try {
        schedule = await decrypt(scheduleBlob, pass);
        localStorage.setItem(PASS_KEY, pass);
        showDashboard();
        render();
    } catch {
        document.getElementById('passInput').value = '';
        document.getElementById('passInput').focus();
        document.getElementById('unlockError').classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Unlock';
    }
}

function lock() {
    localStorage.removeItem(PASS_KEY);
    schedule     = null;
    heroAnimated = false;
    document.getElementById('passInput').value = '';
    showUnlock();
}

function toggleEye(btn) {
    const inp = document.getElementById('passInput');
    if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
    } else {
        inp.type = 'password';
        btn.textContent = '👁';
    }
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
    try {
        const r = await fetch('data/stock.json');
        stockData = await r.json();
    } catch { /* */ }

    try {
        const r = await fetch('data/s.json');
        scheduleBlob = await r.json();
    } catch {
        showUnlock('Could not load schedule data — are you running on a server?');
        return;
    }

    const cached = localStorage.getItem(PASS_KEY);
    if (cached) {
        try {
            schedule = await decrypt(scheduleBlob, cached);
            showDashboard();
            render();
            return;
        } catch {
            localStorage.removeItem(PASS_KEY);
        }
    }

    showUnlock();
}

window.onload = init;
</script>
